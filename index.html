document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

if;font-size:17px;line-height:1.6;color:#9aa3b2;margin:0\">The hard part isn't getting a model to suggest an action — it's letting it move real money without giving it the keys. Here's a live run: the agent reasons off-chain, the smart contract enforces the rules on-chain, and nothing settles outside the bounds we wrote in code.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-delay=\"120\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid #1c2029;border-radius:18px;background:#0c0e11;overflow:hidden;box-shadow:0 30px 70px -36px rgba(0,0,0,.9)\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid #16191f;background:#0e1014;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#6f7787\">\n          <span style=\"display:flex;gap:6px\"><i style=\"width:10px;height:10px;border-radius:50%;background:#2a2f38;display:inline-block\"><\u002Fi><i style=\"width:10px;height:10px;border-radius:50%;background:#2a2f38;display:inline-block\"><\u002Fi><i style=\"width:10px;height:10px;border-radius:50%;background:#2a2f38;display:inline-block\"><\u002Fi><\u002Fspan>\n          <span style=\"margin-left:6px\">agent-run · <span style=\"color:#cdd3dc\">treasury-rebalance.flow<\u002Fspan><\u002Fspan>\n          <span style=\"margin-left:auto;display:flex;align-items:center;gap:6px\"><i style=\"width:6px;height:6px;border-radius:50%;background:#5bd6a8;box-shadow:0 0 7px #5bd6a8;animation:zblink 1.5s infinite;display:inline-block\"><\u002Fi><span id=\"z-run-status\" style=\"color:#e0a64d\">running…<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.2fr 70px 1fr\">\n          <!-- AI reason -->\n          <div style=\"padding:22px 24px;border-right:1px solid #16191f\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:#8b7bff;margin-bottom:14px\">◣ OFF-CHAIN · AGENT REASONS<\u002Fdiv>\n            <div id=\"z-term\" style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.85;color:#9aa3b2;min-height:218px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <!-- seam -->\n          <div style=\"position:relative;display:flex;align-items:center;justify-content:center\">\n            <svg viewBox=\"0 0 70 260\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%\">\n              <line x1=\"35\" y1=\"16\" x2=\"35\" y2=\"244\" stroke=\"url(#vseam)\" stroke-width=\"1.4\" stroke-dasharray=\"3 6\" opacity=\".55\"><\u002Fline>\n              <defs><linearGradient id=\"vseam\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#8b7bff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#e0a64d\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n              <circle r=\"3.6\" fill=\"#8b7bff\"><animateMotion dur=\"2.4s\" repeatCount=\"indefinite\" path=\"M35,16 L35,244\"><\u002FanimateMotion><\u002Fcircle>\n              <circle r=\"3\" fill=\"#e0a64d\"><animateMotion dur=\"2.4s\" begin=\"1.2s\" repeatCount=\"indefinite\" path=\"M35,16 L35,244\"><\u002FanimateMotion><\u002Fcircle>\n            <\u002Fsvg>\n            <span style=\"position:absolute;bottom:10px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:#6f7787;background:#0c0e11;padding:3px 5px;border-radius:4px\">the seam<\u002Fspan>\n          <\u002Fdiv>\n          <!-- on-chain enforce -->\n          <div style=\"padding:22px 24px\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:#e0a64d;margin-bottom:14px\">ON-CHAIN · CONTRACT ENFORCES ◢<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <div style=\"border:1px solid #1f2530;border-radius:11px;padding:14px;background:#0e1116\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#e0a64d;margin-bottom:7px\">require(...) — or revert<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8b93a1;line-height:1.8\">healthFactor ≥ 1.0 <span style=\"color:#5bd6a8\">✓<\u002Fspan><br>slippage ≤ 0.5% <span style=\"color:#5bd6a8\">✓<\u002Fspan><br>perTxCap ≤ 25,000 USDC <span style=\"color:#5bd6a8\">✓<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #1f2530;border-radius:11px;padding:14px;background:#0e1116\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#cdd3dc;margin-bottom:5px\">tx 0x9f3c…a17<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8b93a1;line-height:1.8\">rebalance 12,400 USDC → vault<br>block 21,403,118 · 1.2s · $0.004<\u002Fdiv>\n              <\u002Fdiv>\n              <div id=\"z-final\" style=\"border:1px solid rgba(91,214,168,.32);border-radius:11px;padding:13px 14px;background:rgba(91,214,168,.06);font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5bd6a8;opacity:.35;transition:opacity .5s\">✓ value moved — strictly within on-chain bounds<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"200\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);display:flex;gap:30px;flex-wrap:wrap;justify-content:center;margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#6f7787\">\n        <span><span style=\"color:#8b7bff\">▸<\u002Fspan> agent never holds custody<\u002Fspan>\n        <span><span style=\"color:#e0a64d\">▸<\u002Fspan> rules live in the contract, not the prompt<\u002Fspan>\n        <span><span style=\"color:#5bd6a8\">▸<\u002Fspan> every step provable on-chain<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<!-- ============ DIAGRAM · RELIABILITY CLIFF ============ -->\n  <section style=\"padding:88px 40px;background:#ece8e0\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:740px;margin:0 auto 34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Reliability compounding<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(30px,3.6vw,44px);letter-spacing:-.03em;line-height:1.08;margin:14px 0 12px\">Why agent reliability collapses on long tasks.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:1.6;color:#56524a;margin:0\">A long task is a chain of steps. If each step is independent, end-to-end success is <span style=\"font-family:'JetBrains Mono',monospace;color:#16140f\">p<sup>N<\u002Fsup><\u002Fspan> — it decays <em>exponentially<\u002Fem>. You don't fix that by waiting for a smarter model; you fix it with architecture: a verifier that catches a bad step and a bounded retry. On-chain, the contract <em>is<\u002Fem> that verifier.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(22,20,15,.1);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 14px 44px -32px rgba(22,20,15,.35)\"><div style=\"display:grid;grid-template-columns:1fr 290px;gap:0;align-items:stretch;border-top:1px solid rgba(22,20,15,.08);margin-top:22px\">\n          <div style=\"padding:24px 20px 24px 28px;border-right:1px solid rgba(22,20,15,.08)\">\n            <svg class=\"zsvg\" viewBox=\"0 0 720 360\" style=\"width:100%;height:auto;display:block\" font-family=\"'JetBrains Mono',monospace\">\n              <!-- gridlines -->\n              <line x1=\"60\" y1=\"30\" x2=\"690\" y2=\"30\" stroke=\"rgba(22,20,15,.06)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"60\" y1=\"102.5\" x2=\"690\" y2=\"102.5\" stroke=\"rgba(22,20,15,.06)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"60\" y1=\"175\" x2=\"690\" y2=\"175\" stroke=\"rgba(22,20,15,.22)\" stroke-width=\"1\" stroke-dasharray=\"4 5\"><\u002Fline>\n              <line x1=\"60\" y1=\"247.5\" x2=\"690\" y2=\"247.5\" stroke=\"rgba(22,20,15,.06)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"60\" y1=\"320\" x2=\"690\" y2=\"320\" stroke=\"rgba(22,20,15,.18)\" stroke-width=\"1\"><\u002Fline>\n              <text x=\"52\" y=\"34\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"end\">100%<\u002Ftext>\n              <text x=\"52\" y=\"106\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"end\">75%<\u002Ftext>\n              <text x=\"52\" y=\"179\" font-size=\"10\" fill=\"#a4660f\" text-anchor=\"end\">50%<\u002Ftext>\n              <text x=\"52\" y=\"251\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"end\">25%<\u002Ftext>\n              <text x=\"52\" y=\"320\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"end\">0%<\u002Ftext>\n              <text x=\"372\" y=\"179\" font-size=\"9\" fill=\"#a4660f\" text-anchor=\"middle\" dy=\"-3\" opacity=\".8\">coin flip<\u002Ftext>\n              <!-- x labels -->\n              <text x=\"60\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">0<\u002Ftext>\n              <text x=\"186\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">10<\u002Ftext>\n              <text x=\"312\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">20<\u002Ftext>\n              <text x=\"438\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">30<\u002Ftext>\n              <text x=\"564\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">40<\u002Ftext>\n              <text x=\"690\" y=\"338\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">50<\u002Ftext>\n              <text x=\"375\" y=\"354\" font-size=\"10\" fill=\"#56524a\" text-anchor=\"middle\" letter-spacing=\"1\">STEPS IN THE TASK  (N)<\u002Ftext>\n              <!-- curves -->\n              <path id=\"relNaive\" d=\"\" fill=\"none\" stroke=\"#d8472b\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n              <path id=\"relBound\" d=\"\" fill=\"none\" stroke=\"#5b50e6\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n              <!-- marker -->\n              <line id=\"relMarkLine\" x1=\"312\" y1=\"30\" x2=\"312\" y2=\"320\" stroke=\"rgba(22,20,15,.35)\" stroke-width=\"1\"><\u002Fline>\n              <circle id=\"relDotN\" cx=\"312\" cy=\"0\" r=\"5\" fill=\"#d8472b\" stroke=\"#f5f4f1\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle id=\"relDotB\" cx=\"312\" cy=\"0\" r=\"5\" fill=\"#5b50e6\" stroke=\"#f5f4f1\" stroke-width=\"1.5\"><\u002Fcircle>\n              <!-- legend -->\n              <g font-size=\"11\">\n                <circle cx=\"78\" cy=\"50\" r=\"4\" fill=\"#d8472b\"><\u002Fcircle><text x=\"88\" y=\"54\" fill=\"#56524a\">naive agent · pⁿ<\u002Ftext>\n                <circle cx=\"220\" cy=\"50\" r=\"4\" fill=\"#5b50e6\"><\u002Fcircle><text x=\"230\" y=\"54\" fill=\"#56524a\">bounded · verify + retry<\u002Ftext>\n              <\u002Fg>\n              <rect id=\"relOverlay\" data-overlay=\"\" x=\"60\" y=\"30\" width=\"630\" height=\"290\" fill=\"transparent\"><\u002Frect>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <!-- controls -->\n          <div style=\"padding:24px 26px;display:flex;flex-direction:column;gap:22px\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">per-step reliability&nbsp;<span style=\"color:#16140f\">p<\u002Fspan><\u002Fspan><span id=\"relPVal\" style=\"color:#5b50e6;font-weight:600\">0.95<\u002Fspan><\u002Fdiv>\n              <input id=\"relP\" type=\"range\" min=\"0.80\" max=\"0.99\" step=\"0.005\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">verify + retries&nbsp;<span style=\"color:#16140f\">k<\u002Fspan><\u002Fspan><span id=\"relKVal\" style=\"color:#5b50e6;font-weight:600\">3<\u002Fspan><\u002Fdiv>\n              <input id=\"relK\" type=\"range\" min=\"1\" max=\"4\" step=\"1\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid rgba(22,20,15,.1);padding-top:18px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#8c8679;margin-bottom:12px\">AT <span id=\"relAtN\" style=\"color:#16140f\">20<\u002Fspan> STEPS<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:12px\">\n                <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#d8472b;line-height:1\" id=\"relNaivePct\">35.8%<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8c8679;margin-top:2px\">naive agent succeeds<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#5b50e6;line-height:1\" id=\"relBoundPct\">99.8%<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8c8679;margin-top:2px\">bounded agent succeeds<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#56524a;line-height:1.7;border-top:1px solid rgba(22,20,15,.1);padding-top:14px\">\n              <div>coin-flip at N = <span id=\"relCoin\" style=\"color:#a4660f\">14<\u002Fspan><\u002Fdiv>\n              <div>90%-horizon: <span id=\"relHorN\" style=\"color:#d8472b\">2<\u002Fspan> → <span id=\"relHorB\" style=\"color:#5b50e6\">800+<\u002Fspan> steps<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8c8679\">naive = pᴺ   ·   bounded = (1 − (1−p)ᵏ)ᴺ   ·   the gap is the value of verification<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PILLARS ============ -->\n  <section style=\"padding:84px 40px;max-width:1200px;margin:0 auto\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:680px;margin:0 auto 48px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8c8679\">Two disciplines · one team<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(32px,3.8vw,46px);letter-spacing:-.03em;line-height:1.08;margin:16px 0 0\">Most teams pick a side. We engineer both.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n      <!-- AI pillar -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:20px;background:#fff;padding:34px 32px;box-shadow:0 12px 40px -28px rgba(22,20,15,.3)\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:18px\">\n          <span style=\"width:38px;height:38px;border-radius:11px;background:rgba(91,80,230,.1);display:flex;align-items:center;justify-content:center\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"3.4\" fill=\"#5b50e6\"><\u002Fcircle><circle cx=\"5\" cy=\"6\" r=\"2\" fill=\"#5b50e6\" opacity=\".5\"><\u002Fcircle><circle cx=\"19\" cy=\"6\" r=\"2\" fill=\"#5b50e6\" opacity=\".5\"><\u002Fcircle><circle cx=\"5\" cy=\"18\" r=\"2\" fill=\"#5b50e6\" opacity=\".5\"><\u002Fcircle><circle cx=\"19\" cy=\"18\" r=\"2\" fill=\"#5b50e6\" opacity=\".5\"><\u002Fcircle><path d=\"M12 12L5 6M12 12l7-6M12 12l-7 6M12 12l7 6\" stroke=\"#5b50e6\" stroke-width=\"1.2\" opacity=\".5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#5b50e6\">01 · Intelligence<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:27px;letter-spacing:-.02em;margin:0 0 12px;color:#16140f\">AI &amp; Agentic Automation<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;line-height:1.62;color:#56524a;margin:0 0 22px\">From a single automated workflow to large-scale, multi-agent systems that plan, call tools, and act under supervision. We ship for enterprises and prototype fast for startup teams.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#5b50e6;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Enterprise agentic systems<\u002Fstrong> — orchestration, tools, memory, evals &amp; observability.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#5b50e6;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Domain automation<\u002Fstrong> — for manufacturing, accounting, and legal operations.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#5b50e6;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Product prototypes<\u002Fstrong> — zero-to-one agent products for founding teams.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#5b50e6;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Guardrails &amp; safety<\u002Fstrong> — bounded autonomy, human-in-the-loop, audit trails.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:22px;border-top:1px solid rgba(22,20,15,.08);padding-top:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5b50e6;background:rgba(91,80,230,.08);border-radius:30px;padding:5px 11px\">LangGraph<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5b50e6;background:rgba(91,80,230,.08);border-radius:30px;padding:5px 11px\">Temporal<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5b50e6;background:rgba(91,80,230,.08);border-radius:30px;padding:5px 11px\">MCP<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5b50e6;background:rgba(91,80,230,.08);border-radius:30px;padding:5px 11px\">Claude<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5b50e6;background:rgba(91,80,230,.08);border-radius:30px;padding:5px 11px\">open models<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- On-chain pillar -->\n      <div data-reveal=\"\" data-delay=\"120\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:20px;background:#fff;padding:34px 32px;box-shadow:0 12px 40px -28px rgba(22,20,15,.3)\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:18px\">\n          <span style=\"width:38px;height:38px;border-radius:11px;background:rgba(207,138,44,.12);display:flex;align-items:center;justify-content:center\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"9\" width=\"16\" height=\"11\" rx=\"2\" stroke=\"#a4660f\" stroke-width=\"1.6\"><\u002Frect><path d=\"M7 9V6.5A5 5 0 0117 6.5V9\" stroke=\"#cf8a2c\" stroke-width=\"1.6\"><\u002Fpath><circle cx=\"12\" cy=\"14.5\" r=\"1.6\" fill=\"#a4660f\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a4660f\">02 · Value<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:27px;letter-spacing:-.02em;margin:0 0 12px;color:#16140f\">On-Chain &amp; DeFi Engineering<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;line-height:1.62;color:#56524a;margin:0 0 22px\">Core protocol work — not generic dApp glue. We design and ship value-bearing systems where the economics and the security have to be right the first time.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#cf8a2c;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Lending &amp; money markets<\u002Fstrong> — collateral, liquidations, rate models.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#cf8a2c;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">DEXs &amp; derivatives<\u002Fstrong> — AMMs, order books, and perps/futures venues.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#cf8a2c;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Yield &amp; RWA protocols<\u002Fstrong> — vaults, strategies, tokenized real assets.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"color:#cf8a2c;font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px\">▸<\u002Fspan><span style=\"font-size:14.5px;color:#16140f\"><strong style=\"font-weight:600\">Economic risk dashboards<\u002Fstrong> — stress testing, monitoring, assessment.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:22px;border-top:1px solid rgba(22,20,15,.08);padding-top:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a4660f;background:rgba(207,138,44,.1);border-radius:30px;padding:5px 11px\">Solidity<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a4660f;background:rgba(207,138,44,.1);border-radius:30px;padding:5px 11px\">Rust<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a4660f;background:rgba(207,138,44,.1);border-radius:30px;padding:5px 11px\">Soroban<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a4660f;background:rgba(207,138,44,.1);border-radius:30px;padding:5px 11px\">Move<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a4660f;background:rgba(207,138,44,.1);border-radius:30px;padding:5px 11px\">EVM · Solana · Stellar<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<!-- ============ DIAGRAM · EMBEDDINGS ============ -->\n  <section style=\"padding:88px 40px;background:#ece8e0\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:740px;margin:0 auto 34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Embeddings &amp; semantic search<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(30px,3.6vw,44px);letter-spacing:-.03em;line-height:1.08;margin:14px 0 12px\">How AI turns text into searchable meaning.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:1.6;color:#56524a;margin:0\">An embedding model turns text into a long vector of numbers, so that <em>meaning becomes distance<\u002Fem>: related ideas land near each other. Search stops being keyword-matching and becomes geometry — find the nearest neighbors. It's the retrieval step behind <em>RAG<\u002Fem> (retrieval-augmented generation) — how an agent pulls the right context before it answers, matched by cosine similarity.<\u002Fp>\n      <\u002Fdiv>\n      <div id=\"emWrap\" style=\"border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;overflow:hidden;box-shadow:0 16px 48px -34px rgba(22,20,15,.4);display:grid;grid-template-columns:296px 1fr 312px\"><div style=\"padding:26px 24px;border-right:1px solid rgba(22,20,15,.08);display:flex;flex-direction:column;gap:20px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"width:20px;height:20px;border-radius:6px;background:#5b50e614;color:#5b50e6;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600\">1<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5b50e6\">Encode<\u002Fspan><\u002Fdiv><div><div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:8px\">input<\u002Fdiv><div id=\"emInput\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#16140f;background:#faf9f7;border:1px solid rgba(22,20,15,.1);border-radius:9px;padding:10px 12px\">\"chargeback dispute\"<\u002Fdiv><\u002Fdiv><div><div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:8px\">sub-tokens<\u002Fdiv><div id=\"emTokens\" style=\"display:flex;flex-wrap:wrap;gap:6px\"><\u002Fdiv><\u002Fdiv><div><div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:9px\">embedding vector · ℝ¹⁵³⁶<\u002Fdiv><div id=\"emCellWrap\" style=\"display:grid;grid-template-columns:repeat(16,1fr);grid-auto-rows:15px;gap:2px\"><\u002Fdiv><div id=\"emNorm\" style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-top:9px;text-transform:none;letter-spacing:0;font-size:10.5px;color:#8c8679\">‖v‖ = 1.00<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"padding:26px 26px 22px;border-right:1px solid rgba(22,20,15,.08);display:flex;flex-direction:column\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"width:20px;height:20px;border-radius:6px;background:#16140f14;color:#16140f;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600\">2<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#16140f\">Place<\u002Fspan><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:6px\">1,536-d projected to 2-D · near = similar meaning<\u002Fdiv><svg id=\"emPlot\" viewBox=\"0 0 460 320\" style=\"width:100%;height:auto;display:block;margin:auto 0\" font-family=\"'JetBrains Mono',monospace\"><\u002Fsvg><\u002Fdiv><div style=\"padding:26px 24px;display:flex;flex-direction:column;gap:13px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"width:20px;height:20px;border-radius:6px;background:#cf8a2c14;color:#cf8a2c;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600\">3<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#cf8a2c\">Retrieve<\u002Fspan><\u002Fdiv><div id=\"emQueryLabel\" style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">query —<\u002Fdiv><div id=\"emRanks\" style=\"display:flex;flex-direction:column;gap:12px;flex:1\"><\u002Fdiv><div style=\"border-top:1px solid rgba(22,20,15,.08);padding-top:13px;display:flex;align-items:center;gap:11px\"><svg id=\"emCosArc\" width=\"40\" height=\"34\" viewBox=\"0 0 40 34\"><\u002Fsvg><span id=\"emCos\" style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56524a\">—<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8c8679\">cosine(a, b) = (a · b) / (‖a‖ ‖b‖)  ·  retrieve the k nearest neighbors<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ AUTOMATION BY INDUSTRY ============ -->\n  <section id=\"automation\" style=\"padding:84px 40px;max-width:1200px;margin:0 auto\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);max-width:720px;margin:0 auto 46px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Automation · by industry<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(32px,3.8vw,46px);letter-spacing:-.03em;line-height:1.08;margin:16px 0 14px\">The back office, run by agents.<\u002Fh2>\n      <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:17px;line-height:1.6;color:#56524a;margin:0\">From a single workflow to a supervised fleet — the same engineering rigor we bring on-chain, applied to the work that actually runs a business. A few of the places it fits:<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n\n      <!-- Manufacturing -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"13\" width=\"6\" height=\"7\" rx=\"1\" stroke=\"#5b50e6\" stroke-width=\"1.6\"><\u002Frect><rect x=\"11\" y=\"9\" width=\"6\" height=\"11\" rx=\"1\" stroke=\"#5b50e6\" stroke-width=\"1.6\"><\u002Frect><path d=\"M4 13l4.5-4.5M17 9l3-3\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linecap=\"round\" opacity=\".55\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Manufacturing · procurement &amp; QA<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Keep the plant moving<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Agents read ERP and sensor data, flag quality anomalies, draft purchase orders, and chase approvals — the loop that keeps procurement and the line in sync.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Accounting -->\n      <div data-reveal=\"\" data-delay=\"80\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"5\" width=\"16\" height=\"14\" rx=\"2\" stroke=\"#5b50e6\" stroke-width=\"1.6\"><\u002Frect><path d=\"M8 9h8M8 12h8M8 15h5\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Accounting · close &amp; reconciliation<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Surface only the exceptions<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Month-end close, ledger reconciliation, and audit-prep agents pull from the books and hand a human only the line items that genuinely need judgment.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Legal -->\n      <div data-reveal=\"\" data-delay=\"160\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 4h7l4 4v12H7z\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M13 4v5h5\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M10 13h5M10 16h3\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Legal · contracts &amp; intake<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Redline, summarize, route<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Contract review, client intake, and discovery agents that draft and triage at volume — with a lawyer on every final call and a full audit trail.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Marketing & SEO -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"6\" stroke=\"#5b50e6\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M15.5 15.5L20 20\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Marketing · content &amp; SEO<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Hand the busywork to agents<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Research, briefs, content production, and performance reporting run by agents — so the team spends its hours on strategy, not the grind.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Customer Ops -->\n      <div data-reveal=\"\" data-delay=\"80\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 6h14v9H9l-4 4V6z\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M9 10h6M9 12.5h4\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Customer ops · support &amp; triage<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Resolve routine, escalate the rest<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Ticket triage, response drafting, and knowledge agents that close the routine cases around the clock and route the hard ones to a person.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Back office -->\n      <div data-reveal=\"\" data-delay=\"160\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:18px;background:#fff;padding:28px 26px;display:flex;flex-direction:column;box-shadow:0 10px 36px -26px rgba(22,20,15,.3)\">\n        <span style=\"width:40px;height:40px;border-radius:12px;background:rgba(91,80,230,.09);display:flex;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"5\" y=\"4\" width=\"11\" height=\"14\" rx=\"1.5\" stroke=\"#5b50e6\" stroke-width=\"1.6\"><\u002Frect><path d=\"M8 6h13v14H10\" stroke=\"#5b50e6\" stroke-width=\"1.6\" stroke-linejoin=\"round\" opacity=\".5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8c8679;margin-bottom:7px\">Back office · documents &amp; data<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0 0 9px;color:#16140f\">Fewer handoffs, fewer errors<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.58;color:#56524a;margin:0 0 18px;flex:1\">Invoice processing, data entry, and document workflows automated end to end — extraction, validation, and routing without the copy-paste.<\u002Fp>\n        <a href=\"#contact\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5b50e6;border-bottom:1px solid rgba(91,80,230,.3);padding-bottom:2px;align-self:flex-start\">Explore use case →<\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(14px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#8c8679\">…and dozens more. If it's repetitive, rule-bound, and high-volume, an agent can probably run it.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ DIAGRAM · MARGINAL AGENT ============ -->\n  <section style=\"padding:88px 40px;background:#f4f2ed\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:740px;margin:0 auto 34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Unit economics<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(30px,3.6vw,44px);letter-spacing:-.03em;line-height:1.08;margin:14px 0 12px\">Human ops scale with volume. Agent ops scale toward the gas fee.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:1.6;color:#56524a;margin:0\">Humans cost the same per task forever — a flat line. An agent is the opposite shape: expensive to build, then almost free to run, its cost-per-task collapsing toward the settlement fee as volume grows. Drag your own numbers and read what it's worth.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(22,20,15,.1);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 14px 44px -32px rgba(22,20,15,.35)\"><div style=\"display:grid;grid-template-columns:1fr 290px;gap:0;align-items:stretch;border-top:1px solid rgba(22,20,15,.08);margin-top:22px\">\n          <div style=\"padding:24px 20px 24px 28px;border-right:1px solid rgba(22,20,15,.08)\">\n            <svg class=\"zsvg\" viewBox=\"0 0 720 340\" style=\"width:100%;height:auto;display:block\" font-family=\"'JetBrains Mono',monospace\">\n              <line x1=\"60\" y1=\"30\" x2=\"60\" y2=\"300\" stroke=\"rgba(22,20,15,.18)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"60\" y1=\"300\" x2=\"690\" y2=\"300\" stroke=\"rgba(22,20,15,.18)\" stroke-width=\"1\"><\u002Fline>\n              <!-- savings region -->\n              <path id=\"margSave\" d=\"\" fill=\"rgba(31,157,99,.16)\" stroke=\"none\"><\u002Fpath>\n              <!-- human flat line -->\n              <line id=\"margHuman\" x1=\"60\" y1=\"140\" x2=\"690\" y2=\"140\" stroke=\"#a4660f\" stroke-width=\"2.2\"><\u002Fline>\n              <!-- floor -->\n              <line id=\"margFloor\" x1=\"60\" y1=\"296\" x2=\"690\" y2=\"296\" stroke=\"rgba(22,20,15,.3)\" stroke-width=\"1\" stroke-dasharray=\"4 5\"><\u002Fline>\n              <text id=\"margFloorLbl\" x=\"686\" y=\"290\" font-size=\"9.5\" fill=\"#8c8679\" text-anchor=\"end\">$0.04 floor — the settlement fee<\u002Ftext>\n              <!-- agent curve -->\n              <path id=\"margAgent\" d=\"\" fill=\"none\" stroke=\"#5b50e6\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n              <!-- breakeven -->\n              <line id=\"margBE\" x1=\"300\" y1=\"30\" x2=\"300\" y2=\"300\" stroke=\"rgba(22,20,15,.3)\" stroke-width=\"1\" stroke-dasharray=\"2 4\"><\u002Fline>\n              <circle id=\"margBERing\" cx=\"300\" cy=\"140\" r=\"6\" fill=\"none\" stroke=\"#16140f\" stroke-width=\"1.6\"><\u002Fcircle>\n              <text id=\"margBELbl\" x=\"300\" y=\"24\" font-size=\"9.5\" fill=\"#56524a\" text-anchor=\"middle\">breakeven<\u002Ftext>\n              <!-- volume marker -->\n              <line id=\"margVLine\" x1=\"430\" y1=\"30\" x2=\"430\" y2=\"300\" stroke=\"rgba(91,80,230,.4)\" stroke-width=\"1\"><\u002Fline>\n              <circle id=\"margDot\" cx=\"430\" cy=\"160\" r=\"5\" fill=\"#5b50e6\" stroke=\"#f5f4f1\" stroke-width=\"1.5\"><\u002Fcircle>\n              <!-- x labels -->\n              <text x=\"60\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">10<\u002Ftext>\n              <text x=\"186\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">100<\u002Ftext>\n              <text x=\"312\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">1k<\u002Ftext>\n              <text x=\"438\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">10k<\u002Ftext>\n              <text x=\"564\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">100k<\u002Ftext>\n              <text x=\"690\" y=\"318\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">1M<\u002Ftext>\n              <text x=\"375\" y=\"334\" font-size=\"10\" fill=\"#56524a\" text-anchor=\"middle\" letter-spacing=\"1\">MONTHLY TASK VOLUME  (log)<\u002Ftext>\n              <text x=\"20\" y=\"170\" font-size=\"10\" fill=\"#56524a\" text-anchor=\"middle\" transform=\"rotate(-90 20 170)\" letter-spacing=\"1\">COST / TASK<\u002Ftext>\n              <g font-size=\"11\"><circle cx=\"86\" cy=\"48\" r=\"4\" fill=\"#a4660f\"><\u002Fcircle><text x=\"96\" y=\"52\" fill=\"#56524a\">human<\u002Ftext><circle cx=\"170\" cy=\"48\" r=\"4\" fill=\"#5b50e6\"><\u002Fcircle><text x=\"180\" y=\"52\" fill=\"#56524a\">agent<\u002Ftext><\u002Fg>\n              <rect id=\"margOverlay\" data-overlay=\"\" x=\"60\" y=\"30\" width=\"630\" height=\"270\" fill=\"transparent\"><\u002Frect>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"padding:24px 26px;display:flex;flex-direction:column;gap:18px\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">monthly volume<\u002Fspan><span id=\"margVVal\" style=\"color:#5b50e6;font-weight:600\">20,000<\u002Fspan><\u002Fdiv>\n              <input id=\"margV\" type=\"range\" min=\"1\" max=\"6\" step=\"0.02\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">human $/task<\u002Fspan><span id=\"margChVal\" style=\"color:#5b50e6;font-weight:600\">$4.20<\u002Fspan><\u002Fdiv>\n              <input id=\"margCh\" type=\"range\" min=\"1\" max=\"15\" step=\"0.1\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">build cost<\u002Fspan><span id=\"margFVal\" style=\"color:#5b50e6;font-weight:600\">$60k<\u002Fspan><\u002Fdiv>\n              <input id=\"margF\" type=\"range\" min=\"10000\" max=\"250000\" step=\"1000\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid rgba(22,20,15,.1);padding-top:16px;display:flex;flex-direction:column;gap:12px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">agent $/task<\u002Fspan><span id=\"margPer\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#16140f\">—<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">breakeven<\u002Fspan><span id=\"margBEv\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#16140f\">—<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">monthly saving<\u002Fspan><span id=\"margSaveV\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;color:#1f9d63\">—<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">payback<\u002Fspan><span id=\"margPay\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#16140f\">—<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8c8679\">agent(V) = F / V + m   ·   floor m = $0.04   ·   breakeven V* = F / (c_h − m)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONVERGENCE PRINCIPLE — 4-step walk ============ -->\n  <section style=\"background:#ece8e0;padding:84px 40px;border-top:1px solid rgba(22,20,15,.06);border-bottom:1px solid rgba(22,20,15,.06)\">\n    <div style=\"max-width:1140px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);max-width:700px;margin:0 auto 46px;text-align:center\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8c8679\">The convergence principle<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(32px,3.8vw,46px);letter-spacing:-.03em;line-height:1.08;margin:16px 0 14px\">Bounded by code, not trust.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:17px;line-height:1.6;color:#56524a;margin:0\">Autonomy is only safe when the limits are enforceable. Every system we build at the seam follows the same four moves.<\u002Fp>\n      <\u002Fdiv>\n      <div id=\"z-steps\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n        <div data-step=\"\" data-num-wrap=\"\" style=\"border:1px solid rgba(22,20,15,.09);border-radius:16px;background:#fbfaf8;padding:24px 22px;transition:border-color .4s,box-shadow .4s,background .4s\">\n          <div data-num=\"\" style=\"width:42px;height:42px;border-radius:12px;border:1.5px solid rgba(91,80,230,.4);color:#5b50e6;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;transition:all .4s\">01<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;margin:16px 0 7px;color:#16140f\">Observe<\u002Fdiv>\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;line-height:1.55;color:#56524a\">The agent reads on-chain state — prices, positions, health factors — as ground truth.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-step=\"\" style=\"border:1px solid rgba(22,20,15,.09);border-radius:16px;background:#fbfaf8;padding:24px 22px;transition:border-color .4s,box-shadow .4s,background .4s\">\n          <div data-num=\"\" style=\"width:42px;height:42px;border-radius:12px;border:1.5px solid rgba(91,80,230,.4);color:#5b50e6;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;transition:all .4s\">02<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;margin:16px 0 7px;color:#16140f\">Sign<\u002Fdiv>\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;line-height:1.55;color:#56524a\">It reasons, then submits a typed, signed action. It proposes — it never takes custody.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-step=\"\" style=\"border:1px solid rgba(22,20,15,.09);border-radius:16px;background:#fbfaf8;padding:24px 22px;transition:border-color .4s,box-shadow .4s,background .4s\">\n          <div data-num=\"\" style=\"width:42px;height:42px;border-radius:12px;border:1.5px solid rgba(207,138,44,.45);color:#a4660f;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;transition:all .4s\">03<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;margin:16px 0 7px;color:#16140f\">Enforce<\u002Fdiv>\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;line-height:1.55;color:#56524a\">The contract asserts the rules. Outside the bounds, the transaction simply reverts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-step=\"\" style=\"border:1px solid rgba(22,20,15,.09);border-radius:16px;background:#fbfaf8;padding:24px 22px;transition:border-color .4s,box-shadow .4s,background .4s\">\n          <div data-num=\"\" style=\"width:42px;height:42px;border-radius:12px;border:1.5px solid rgba(207,138,44,.45);color:#a4660f;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;transition:all .4s\">04<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;margin:16px 0 7px;color:#16140f\">Settle<\u002Fdiv>\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;line-height:1.55;color:#56524a\">Value moves and finalizes in seconds — every step transparent and provable.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <!-- ============ DIAGRAM · CALIBRATION GATE ============ -->\n  <section style=\"padding:88px 40px;background:#f4f2ed\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:740px;margin:0 auto 34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Selective autonomy<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(30px,3.6vw,44px);letter-spacing:-.03em;line-height:1.08;margin:14px 0 12px\">The agent knows when it doesn't know.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:1.6;color:#56524a;margin:0\">Every decision carries a confidence. Set a gate <span style=\"font-family:'JetBrains Mono',monospace;color:#16140f\">τ<\u002Fspan>: above it, the agent acts; below it, a human does. Drag the gate and watch the trade — push it right and almost no error ships, but humans review more; push it left for full autonomy and errors slip through. There's a cost-optimal place to stand.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(22,20,15,.1);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 14px 44px -32px rgba(22,20,15,.35)\"><div style=\"display:grid;grid-template-columns:1fr 290px;gap:0;align-items:stretch;border-top:1px solid rgba(22,20,15,.08);margin-top:22px\">\n          <div style=\"padding:24px 20px 24px 28px;border-right:1px solid rgba(22,20,15,.08)\">\n            <svg class=\"zsvg\" viewBox=\"0 0 720 300\" style=\"width:100%;height:auto;display:block\" font-family=\"'JetBrains Mono',monospace\">\n              <line x1=\"60\" y1=\"244\" x2=\"690\" y2=\"244\" stroke=\"rgba(22,20,15,.18)\" stroke-width=\"1\"><\u002Fline>\n              <!-- dim escalate region -->\n              <rect id=\"calDim\" x=\"60\" y=\"40\" width=\"378\" height=\"204\" fill=\"rgba(22,20,15,.05)\"><\u002Frect>\n              <!-- distributions -->\n              <path id=\"calCorrect\" d=\"\" fill=\"rgba(31,157,99,.32)\" stroke=\"#1f9d63\" stroke-width=\"1.6\"><\u002Fpath>\n              <path id=\"calWrong\" d=\"\" fill=\"rgba(216,71,43,.34)\" stroke=\"#d8472b\" stroke-width=\"1.6\"><\u002Fpath>\n              <!-- threshold -->\n              <line id=\"calTau\" x1=\"438\" y1=\"26\" x2=\"438\" y2=\"244\" stroke=\"#16140f\" stroke-width=\"1.8\"><\u002Fline>\n              <g id=\"calTauHandle\"><rect x=\"430\" y=\"18\" width=\"16\" height=\"14\" rx=\"3\" fill=\"#16140f\"><\u002Frect><text x=\"438\" y=\"28\" font-size=\"9\" fill=\"#fff\" text-anchor=\"middle\">τ<\u002Ftext><\u002Fg>\n              <!-- region labels -->\n              <text x=\"240\" y=\"58\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\" letter-spacing=\"1.5\">◂ ESCALATE TO HUMAN<\u002Ftext>\n              <text id=\"calAutoLbl\" x=\"565\" y=\"58\" font-size=\"10\" fill=\"#5b50e6\" text-anchor=\"middle\" letter-spacing=\"1.5\">ACT AUTONOMOUSLY ▸<\u002Ftext>\n              <!-- x labels -->\n              <text x=\"60\" y=\"262\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">0<\u002Ftext>\n              <text x=\"218\" y=\"262\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">.25<\u002Ftext>\n              <text x=\"375\" y=\"262\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">.50<\u002Ftext>\n              <text x=\"532\" y=\"262\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">.75<\u002Ftext>\n              <text x=\"690\" y=\"262\" font-size=\"10\" fill=\"#8c8679\" text-anchor=\"middle\">1.0<\u002Ftext>\n              <text x=\"375\" y=\"280\" font-size=\"10\" fill=\"#56524a\" text-anchor=\"middle\" letter-spacing=\"1\">AGENT CONFIDENCE<\u002Ftext>\n              <g font-size=\"11\"><circle cx=\"78\" cy=\"36\" r=\"4\" fill=\"#1f9d63\"><\u002Fcircle><text x=\"88\" y=\"40\" fill=\"#56524a\">would be right<\u002Ftext><circle cx=\"196\" cy=\"36\" r=\"4\" fill=\"#d8472b\"><\u002Fcircle><text x=\"206\" y=\"40\" fill=\"#56524a\">would be wrong<\u002Ftext><\u002Fg>\n              <rect id=\"calOverlay\" data-overlay=\"\" x=\"60\" y=\"26\" width=\"630\" height=\"218\" fill=\"transparent\"><\u002Frect>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"padding:24px 26px;display:flex;flex-direction:column;gap:20px\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">base accuracy<\u002Fspan><span id=\"calAVal\" style=\"color:#5b50e6;font-weight:600\">85%<\u002Fspan><\u002Fdiv>\n              <input id=\"calA\" type=\"range\" min=\"0.6\" max=\"0.97\" step=\"0.01\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:9px\"><span style=\"color:#56524a\">gate&nbsp;<span style=\"color:#16140f\">τ<\u002Fspan><\u002Fspan><span id=\"calTVal\" style=\"color:#5b50e6;font-weight:600\">0.70<\u002Fspan><\u002Fdiv>\n              <input id=\"calT\" type=\"range\" min=\"0.02\" max=\"0.98\" step=\"0.01\" style=\"width:100%;accent-color:#5b50e6\">\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid rgba(22,20,15,.1);padding-top:16px;display:flex;flex-direction:column;gap:13px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">automation rate<\u002Fspan><span id=\"calAuto\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#5b50e6\">—<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">errors shipped<\u002Fspan><span id=\"calErr\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#d8472b\">—<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8c8679\">human reviews<\u002Fspan><span id=\"calHuman\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#16140f\">—<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#56524a;line-height:1.7;border-top:1px solid rgba(22,20,15,.1);padding-top:14px\">cost-optimal gate τ* = <span id=\"calOpt\" style=\"color:#a4660f\">—<\u002Fspan><br><span id=\"calOptHint\" style=\"color:#8c8679\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8c8679\">act if confidence ≥ τ, else escalate   ·   cost(τ) = c_err·errors + c_human·reviews<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CAPABILITIES / FULL STACK ============ -->\n  <section id=\"capabilities\" style=\"padding:84px 40px;max-width:1200px;margin:0 auto\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);max-width:700px;margin:0 auto 46px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8c8679\">The stack we go deep on<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(32px,3.8vw,46px);letter-spacing:-.03em;line-height:1.08;margin:16px 0 0\">We speak the whole stack — fluently.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:16px;background:#fff;padding:26px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5b50e6;margin-bottom:16px\">Agentic AI<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#3a372f\">\n          <span>LangGraph orchestration<\u002Fspan><span>Temporal durable workflows<\u002Fspan><span>Model Context Protocol<\u002Fspan><span>Claude &amp; open models<\u002Fspan><span>Multi-agent planning<\u002Fspan><span>RAG &amp; tool use<\u002Fspan><span>Evals &amp; observability<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"80\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:16px;background:#fff;padding:26px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#a4660f;margin-bottom:16px\">Chains<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#3a372f\">\n          <span>Ethereum<\u002Fspan><span>Base · Arbitrum<\u002Fspan><span>BNB Chain<\u002Fspan><span>Solana<\u002Fspan><span>Stellar<\u002Fspan><span>Sui<\u002Fspan><span>Any EVM L2<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"160\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:16px;background:#fff;padding:26px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#a4660f;margin-bottom:16px\">Languages<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#3a372f\">\n          <span>Solidity<\u002Fspan><span>Rust<\u002Fspan><span>Soroban (Rust)<\u002Fspan><span>Move<\u002Fspan><span>Vyper<\u002Fspan><span>TypeScript · viem<\u002Fspan><span>Python<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"240\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(22,20,15,.1);border-radius:16px;background:#fff;padding:26px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5b50e6;margin-bottom:16px\">DeFi &amp; Risk<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#3a372f\">\n          <span>AMM &amp; order-book DEXs<\u002Fspan><span>Perps &amp; futures<\u002Fspan><span>Lending markets<\u002Fspan><span>Yield vaults<\u002Fspan><span>Tokenized RWAs<\u002Fspan><span>Risk dashboards<\u002Fspan><span>Audits &amp; formal checks<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <!-- ============ DIAGRAM · ATTENTION ============ -->\n  <section style=\"padding:88px 40px;background:#ece8e0\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);text-align:center;max-width:740px;margin:0 auto 34px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#5b50e6\">Self-attention<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(30px,3.6  fill: 'none', stroke: '#5b50e6', 'stroke-width': (0.6 + 6.5 * wt).toFixed(2), opacity: (0.12 + 0.82 * wt).toFixed(2), 'stroke-linecap': 'round', 'data-at': 1 });\n        svg.appendChild(p);\n      }\n      f = (f + 1) % n;\n    };\n    this._attn = setInterval(focus, 1700); focus();\n  }\n\n  initRel() {\n    const NMAX = 50, X0 = 60, X1 = 690, Y0 = 320, Y1 = 30;\n    const xN = (n) => X0 + (n / NMAX) * (X1 - X0);\n    const yP = (P) => Y0 - P * (Y0 - Y1);\n    const pS = this.$('relP'), kS = this.$('relK');\n    if (!pS) return;\n    pS.value = 0.95; kS.value = 3;\n    let markN = 20;\n\n    const draw = () => {\n      const p = +pS.value, k = +kS.value;\n      const peff = 1 - Math.pow(1 - p, k);\n      const naive = [], bound = [];\n      for (let n = 0; n <= NMAX; n += 0.5) {\n        naive.push([xN(n), yP(Math.pow(p, n))]);\n        bound.push([xN(n), yP(Math.pow(peff, n))]);\n      }\n      this.$('relNaive').setAttribute('d', this.linePath(naive));\n      this.$('relBound').setAttribute('d', this.linePath(bound));\n      this.$('relPVal').textContent = p.toFixed(3);\n      this.$('relKVal').textContent = k;\n      // marker\n      const pn = Math.pow(p, markN), pb = Math.pow(peff, markN);\n      const mx = xN(markN);\n      this.$('relMarkLine').setAttribute('x1', mx); this.$('relMarkLine').setAttribute('x2', mx);\n      this.$('relDotN').setAttribute('cx', mx); this.$('relDotN').setAttribute('cy', yP(pn));\n      this.$('relDotB').setAttribute('cx', mx); this.$('relDotB').setAttribute('cy', yP(pb));\n      this.$('relAtN').textContent = markN;\n      this.$('relNaivePct').textContent = (pn * 100).toFixed(1) + '%';\n      this.$('relBoundPct').textContent = (pb * 100).toFixed(1) + '%';\n      // horizons\n      const coin = Math.log(0.5) / Math.log(p);\n      this.$('relCoin').textContent = Math.max(1, Math.round(coin));\n      const horN = Math.log(0.9) / Math.log(p);\n      const horB = Math.log(0.9) / Math.log(peff);\n      const fmtH = (h) => (h > 500 ?
